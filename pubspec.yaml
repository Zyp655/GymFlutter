name: btlmobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^7.6.7
  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.2.3
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  google_sign_in: ^6.2.1
  fl_chart: ^0.68.0
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  url_launcher: ^6.2.5
  connectivity_plus: ^6.0.3
  shimmer: ^3.0.0
  go_router: ^14.0.0
  logger: ^2.4.0
  flutter_dotenv: ^5.2.1
  http: ^1.2.1
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.3

flutter:
